<main class="studio-grid">

    <section class="studio-card" [routerLink]="'/spam'">
        <div class="card-body">
            <div class="icon-wrapper badge-spam">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/><rect width="20" height="16" x="2" y="4" rx="2"/></svg>
            </div>
            <div class="card-text">
                <h2>Spam & Content Detector</h2>
                <p>Inference analyzer for processing lexical arrays and parsing text safety strings.</p>
            </div>
        </div>
        <div class="card-arrow">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        </div>
    </section>

    <section class="studio-card" [routerLink]="'/image'">
        <div class="card-body">
            <div class="icon-wrapper badge-image">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
            </div>
            <div class="card-text">
                <h2>28x28 Image Classifier</h2>
                <p>Computer vision processing matrix for real-time convolutional image tensor evaluation.</p>
            </div>
        </div>
        <div class="card-arrow">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        </div>
    </section>

</main>
